<main class="landing">

  <app-navbar [showGetStarted]="false" [logoLight]="true"></app-navbar>

  <!-- Hero Visuals (rechte Seite, überlappende Kreise) -->
  <div class="landing__visuals" aria-hidden="true">
    <img class="landing__visual landing__visual--top" src="hero_1.webp" alt="" />
    <img class="landing__visual landing__visual--mid" src="hero_2.webp" alt="" />
    <img class="landing__visual landing__visual--bot" src="hero_3.webp" alt="" />
  </div>

  <!-- Main CTA (links, oben) -->
  <section class="landing__main-cta" aria-label="Willkommen bei Code à Cuisine">
    <div class="landing__text">
      <p class="landing__subtitle">AI-Powered recipe generator</p>
      <h1 class="landing__title">Code à Cuisine</h1>
    </div>
    <a class="landing__btn-primary" routerLink="/generator">Get started</a>
  </section>

  <!-- Secondary CTA (links, unten) -->
  <div class="landing__secondary-cta">
    <span class="landing__inspiration">Hungry for inspiration?</span>
    <a class="landing__btn-secondary" routerLink="/cookbook">
      Go to cookbook
      <img src="recipe view/Arrow 11.svg" class="landing__btn-arrow" width="20" alt="" aria-hidden="true" />
    </a>
  </div>

</main>
